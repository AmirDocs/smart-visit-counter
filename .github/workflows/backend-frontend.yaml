name: CI/CD Pipeline

on:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Run flake8 lint (Hghlights but does not fail the build)
        run: flake8 app || true

      - name: Run tests
        run: pytest tests

      - name: Build Docker image
        run: docker build -t fastapi-homepage:latest .

      - name: Set up Trivy
        uses: aquasecurity/trivy-action@0.13.0


      - name: Run Trivy scan on image
        run: trivy image --severity HIGH,CRITICAL --exit-code 1 fastapi-homepage:latest

  frontend:
    runs-on: ubuntu-22.04
    needs: backend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint . --ext .js,.jsx,.ts,.tsx
